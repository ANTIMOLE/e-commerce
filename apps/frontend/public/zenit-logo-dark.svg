<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="zGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#3ECFCF"/>
    </linearGradient>
  </defs>

  <!-- Background dark pill -->
  <rect x="0" y="0" width="200" height="60" rx="8" fill="#0F0F1A"/>

  <!-- Z mark -->
  <g transform="translate(10, 8)">
    <polygon points="4,2 28,2 28,8 14,38 28,38 28,44 4,44 4,38 18,8 4,8" fill="url(#zGrad2)"/>
    <circle cx="32" cy="6" r="3" fill="#3ECFCF" opacity="0.8"/>
  </g>

  <!-- Wordmark white -->
  <text
    x="58"
    y="38"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-1"
    fill="#FFFFFF"
  >ZENIT</text>

  <!-- Gradient underline accent -->
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#3ECFCF"/>
    </linearGradient>
  </defs>
  <rect x="58" y="42" width="100" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text
    x="59"
    y="52"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="7"
    font-weight="400"
    letter-spacing="3.5"
    fill="#6C63FF"
  >MARKETPLACE</text>
</svg>
